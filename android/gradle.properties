# Keep Gradle below the memory ceiling of common developer machines and CI
# runners. The previous 8G/4G profile could exhaust native memory while the
# Android toolchain was compiling release variants.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=2
org.gradle.parallel=false
android.useAndroidX=true
android.enableJetifier=true
kotlin.incremental=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
