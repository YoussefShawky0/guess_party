project_id = "guess_party"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "io.supabase.guessparty://login-callback"
additional_redirect_urls = ["io.supabase.guessparty://login-callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = true
minimum_password_length = 8

[auth.email]
enable_signup = true
# Local Phase 7 migration testing: legacy synthetic addresses cannot confirm
# an old-address email. Production requires an explicit rollout decision.
double_confirm_changes = false
enable_confirmations = false

[analytics]
enabled = false
