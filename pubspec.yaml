name: guess_party
description: "A connected social-deduction party game for online and shared-device play."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  dartz: ^0.10.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.0
  go_router: ^17.0.0
  package_info_plus: ^10.2.0
  share_plus: ^13.2.0
  shared_preferences: ^2.5.4
  sentry_flutter: ^9.24.0
  supabase_flutter: ^2.10.3
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  flutter_native_splash: ^2.4.7
  in_app_update: ^5.0.0
  profanity_filter: ^2.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

  # Adaptive Icon Configuration
  adaptive_icon_background: "#091929"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# Splash Screen Configuration
flutter_native_splash:
  color: "#091929"
  image: "assets/icons/splash_logo.png"
  color_dark: "#091929"
  image_dark: "assets/icons/splash_logo.png"
  android_12:
    color: "#091929"
    image: "assets/icons/splash_logo.png"
    image_dark: "assets/icons/splash_logo.png"
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: scaleAspectFit
  fullscreen: true
