name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate, for example v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PRODUCTION_DART_DEFINES_JSON: ${{ secrets.PRODUCTION_DART_DEFINES_JSON }}
      ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
      ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Verify clean checkout
        run: git diff --quiet && git diff --cached --quiet

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Validate tag and version
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          fi

          dart run tool/validate_release_metadata.dart \
            --pubspec pubspec.yaml \
            --tag "${release_tag}" \
            --require-build

      - name: Install dependencies
        run: flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter=expanded

      - name: Build local Supabase and run contracts
        run: |
          supabase start --ignore-health-check --exclude edge-runtime,gotrue,imgproxy,kong,logflare,mailpit,postgres-meta,postgrest,realtime,storage-api,studio,supavisor,vector
          supabase test db
        shell: bash

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

      - name: Validate production define file exists
        shell: bash
        run: |
          if [ -z "${PRODUCTION_DART_DEFINES_JSON}" ]; then
            echo "Production dart-define JSON is not configured."
            exit 78
          fi

          production_define_file="$RUNNER_TEMP/production.defines.json"
          printf '%s' "${PRODUCTION_DART_DEFINES_JSON}" > "$production_define_file"
          echo "PRODUCTION_DEFINE_FILE=$production_define_file" >> "$GITHUB_ENV"
          dart run tool/validate_dart_defines.dart "$production_define_file"

      - name: Restore release signing inputs
        shell: bash
        run: |
          if [ -z "${ANDROID_RELEASE_KEYSTORE_B64}" ] || \
             [ -z "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" ] || \
             [ -z "${ANDROID_RELEASE_KEY_ALIAS}" ] || \
             [ -z "${ANDROID_RELEASE_KEY_PASSWORD}" ]; then
            echo "Production release signing is not configured."
            exit 78
          fi

          mkdir -p "$RUNNER_TEMP/release-signing"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release-signing/upload.keystore"
          {
            echo "storeFile=$RUNNER_TEMP/release-signing/upload.keystore"
            echo "storePassword=$ANDROID_RELEASE_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_RELEASE_KEY_ALIAS"
            echo "keyPassword=$ANDROID_RELEASE_KEY_PASSWORD"
          } > android/key.properties

      - name: Build production AAB
        run: flutter build appbundle --flavor production --release --dart-define-from-file="$PRODUCTION_DEFINE_FILE"

      - name: Verify release artifact and generate provenance
        shell: bash
        run: |
          artifact_dir="build/app/outputs/bundle/productionRelease"
          artifact="$artifact_dir/app-production-release.aab"
          test -f "$artifact"
          jarsigner -verify -strict "$artifact"
          sha256sum "$artifact" > "$artifact.sha256"
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          fi
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          commit_sha="$(git rev-parse HEAD)"
          cat > "$artifact_dir/app-production-release.provenance.json" <<JSON
          {
            "application": "Guess Party",
            "artifact": "app-production-release.aab",
            "version": "$version",
            "tag": "$release_tag",
            "commit": "$commit_sha",
            "workflow": "$GITHUB_WORKFLOW",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$GITHUB_RUN_ATTEMPT",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          JSON

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guess-party-android-production-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          retention-days: 90
          if-no-files-found: error
          path: |
            build/app/outputs/bundle/productionRelease/app-production-release.aab
            build/app/outputs/bundle/productionRelease/app-production-release.aab.sha256
            build/app/outputs/bundle/productionRelease/app-production-release.provenance.json

      - name: Cleanup signing files
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties
          rm -f "${PRODUCTION_DEFINE_FILE:-}"
          rm -rf "$RUNNER_TEMP/release-signing"
